name: social_media_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+2

environment:
  sdk: ^3.7.2

dependencies:
  audio_session: ^0.2.3
  cached_network_image: ^3.4.1
  chewie: 1.12.1
  cupertino_icons: ^1.0.8
  custom_refresh_indicator: ^4.0.1
  device_preview: ^1.2.0
  dio: ^5.9.2
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_facebook_auth: ^7.1.5
  flutter_svg: 2.2.2
  gap: ^3.0.1
  google_sign_in: ^6.2.1
  image_picker: ^1.2.1
  intl: 0.19.0
  like_button: ^2.1.0
  lottie: ^3.3.1
  path: ^1.9.1
  path_provider: ^2.1.5
  persistent_bottom_nav_bar_v2: ^6.3.1
  record: ^6.2.0
  shared_preferences: 2.5.3
  story_view: ^0.16.6
  supabase_flutter: ^2.12.2
  video_player: 2.10.1

dev_dependencies:
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/launcher.png"

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/PostThemeImgs/
    - assets/icons/
    - assets/icons/inputAreaIcons/
    - assets/lotties/
    - .env
