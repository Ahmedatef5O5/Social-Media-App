name: social_media_app
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  cached_network_image: ^3.4.1
  chewie: 1.12.1
  cupertino_icons: ^1.0.8
  device_preview: ^1.2.0
  file_picker: ^10.3.10
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^6.0.0
  flutter_svg: 2.2.2
  gap: ^3.0.1
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.1.5
  image_picker: ^1.2.1
  intl: 0.19.0
  path: ^1.9.1
  persistent_bottom_nav_bar_v2: ^6.3.1
  supabase_flutter: ^2.12.0
  video_player: ^2.10.0

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/PostThemeImgs/
    - assets/icons/
    - assets/icons/inputAreaIcons/
    - .env
